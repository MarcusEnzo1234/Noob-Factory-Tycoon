<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Factory Tycoon 3D</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <!-- MENU -->
  <div id="menu">
    <div class="menu-center">
      <div class="menu-title">
        <span class="icon">🏭</span>
        <span>Factory Tycoon 3D</span>
      </div>
      <div class="menu-subtitle">
        Build your factory empire! Walk onto the glowing purchase buttons to buy buildings.
        Collect the cash they generate and unlock more powerful machines!
      </div>
      <button id="startBtn" class="start-btn">
        <span class="play">▶</span>
        <span>START GAME</span>
      </button>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div id="moneyBar">
      <span class="coin">🪙</span>
      <span id="moneyText">$0</span>
    </div>
  </div>

  <!-- Hover tooltip (small) -->
  <div id="hoverTip" class="hidden">
    <div class="hoverTitle" id="hoverTitle">Conveyor Belt</div>
    <div class="hoverSub" id="hoverSub">Press E to buy</div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
